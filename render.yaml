services:
  - type: web
    name: rove-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:api
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ROVE_ENVIRONMENT
        value: production
      - key: WEB_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: PRIVY_SIGNER_ID
        sync: false
      - key: PRIVY_POLICY_ID
        sync: false
      - key: PRIVY_AUTHORIZATION_KEYRING_JSON
        sync: false
      - key: PRIVY_AUTHORIZATION_ACTIVE_KEY_IDS
        sync: false
      - key: PIN_PEPPER
        sync: false
      - key: PIN_HASH_VERSION
        value: "2"
      - key: PIN_MAX_FAILURES
        value: "5"
      - key: PIN_LOCK_SECONDS
        value: "900"
      - key: AFRICASTALKING_USSD_CALLBACK_TOKEN
        sync: false
      - key: AFRICASTALKING_USSD_SERVICE_CODE
        sync: false
      - key: AFRICASTALKING_USSD_ALLOWED_IPS
        sync: false
      - key: AFRICASTALKING_ALLOWED_COUNTRY_CODES
        sync: false
      - key: AFRICASTALKING_ALLOWED_NETWORK_CODES
        sync: false
      - key: USSD_SESSION_TTL_SECONDS
        value: "180"
      - key: TRANSACTION_AUTH_TTL_SECONDS
        value: "60"
      - key: MAX_TRANSFER_SOL
        value: "1"
      - key: SOLANA_RPC_URL
        sync: false
      - key: SOLANA_CAIP2
        value: solana:EtWTRABZaYq6iMfeYKouRu166VU2xqa1

  - type: web
    name: rove-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:web
    startCommand: npm run start:web
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_PRIVY_APP_ID
        sync: false
      - key: NEXT_PUBLIC_PRIVY_SIGNER_ID
        sync: false
      - key: NEXT_PUBLIC_PRIVY_POLICY_IDS
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_USSD_SHORTCODE
        sync: false
      - key: NEXT_PUBLIC_SOLANA_CLUSTER
        value: devnet
